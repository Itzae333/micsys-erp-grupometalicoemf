  <!-- Nombre empresa -->
  <text x="60" y="20" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="300" letter-spacing="2" fill="#888888">MANUFACTURA INDUSTRIAL</text>
  <text x="59" y="42" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="1" fill="#1A1A1A">EMFIMIFAR</text>
  <text x="59" y="56" font-family="Inter, -apple-system, sans-serif" font-size="8.5" font-weight="400" letter-spacing="0.5" fill="#AAAAAA">Anaqueles · Góndolas · Estantería</text>
</svg>
