    <polygon points="22,0 44,12 44,32 22,44" fill="#C0392B"/>
    <polygon points="22,0  0,12  0,32 22,44" fill="#922B21"/>
    <polygon points=" 0,32 22,44 44,32 22,20" fill="#E74C3C"/>
    <polygon points="22,-10 44, 2 44,12 22,22" fill="#DDDDD8" opacity="0.7"/>
    <polygon points="22,-10  0, 2  0,12 22,22" fill="#BBBBBA" opacity="0.7"/>
