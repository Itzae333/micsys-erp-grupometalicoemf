services:
  postgres:
    image: postgres:15-alpine
    container_name: grupometalicoemf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: emf
      POSTGRES_PASSWORD: emf_dev_pass
      POSTGRES_DB: grupometalicoemf
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis:
    image: redis:7-alpine
    container_name: grupometalicoemf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
